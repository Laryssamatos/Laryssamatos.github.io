<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato com o BioLabs. Mande suas sugestões ou tire dúvidas pelo formulário.">
    <title>BioLabs | Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">BioLabs</div>
            <button class="menu-toggle" id="mobile-menu">☰</button>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="sobre.html">Sobre Nós</a>
                <a href="servicos.html">Serviços</a>
                <a href="contato.html" class="active">Contato</a>
                <button id="dark-theme-toggle" class="btn-toggle">🌙 Modo Escuro</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h1>Fale Conosco</h1>
            <p>Preencha os dados abaixo para enviar uma mensagem para nossa equipe técnica ou comercial.</p>
            
            <div id="form-feedback" class="feedback-message"></div>

            <form id="contact-form">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                </div>
                <div class="form-group">
                    <label for="email">E-mail de Contato:</label>
                    <input type="email" id="email" name="email" placeholder="nome@provedor.com">
                </div>
                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como podemos ajudar?"></textarea>
                </div>
                <button type="submit" class="btn">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 BioLabs Análises Clínicas. Desenvolvido para o MAPA de Programação Front-End - Unicesumar.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
